<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dakar 2030 – Private Command Centre</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:linear-gradient(180deg,#0a0a0a,#111);
    color:white;
}

header {
    padding:30px;
    text-align:center;
    background:black;
    border-bottom:2px solid #f5c518;
}

h1 { margin:0; color:#f5c518; }

.container {
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(320px,1fr));
    gap:25px;
    padding:30px;
}

.card {
    background:#1a1a1a;
    padding:25px;
    border-radius:12px;
    border:1px solid #222;
    box-shadow:0 0 20px rgba(0,0,0,0.6);
}

.card h3 {
    margin-top:0;
    color:#f5c518;
}

input {
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#111;
    border:1px solid #333;
    color:white;
    border-radius:6px;
}

.progress-bar {
    background:#222;
    border-radius:10px;
    margin-top:15px;
    height:20px;
    overflow:hidden;
}

.progress {
    height:100%;
    width:0%;
    background:#f5c518;
    transition:0.4s;
}

.metric {
    font-size:22px;
    margin-top:10px;
}

.countdown-grid {
    display:grid;
    grid-template-columns: repeat(5,1fr);
    gap:10px;
    text-align:center;
    margin-top:15px;
}

.time-box {
    background:#111;
    padding:15px;
    border-radius:8px;
    border:1px solid #333;
}

.time-box span {
    display:block;
    font-size:26px;
    font-weight:bold;
    color:#f5c518;
}

.checklist label {
    display:block;
    margin-top:8px;
}

</style>
</head>

<body>

<header>
<h1>PRIVATE PERFORMANCE COMMAND CENTRE</h1>
<p>Journey to Dakar 2030 – Operational Control</p>
</header>

<div class="container">

<!-- SMART COUNTDOWN -->
<div class="card">
<h3>⏳ Smart Countdown to Dakar 2030</h3>
<div class="countdown-grid">
<div class="time-box"><span id="years">0</span>Years</div>
<div class="time-box"><span id="days">0</span>Days</div>
<div class="time-box"><span id="hours">0</span>Hours</div>
<div class="time-box"><span id="minutes">0</span>Minutes</div>
<div class="time-box"><span id="seconds">0</span>Seconds</div>
</div>
</div>

<!-- FINANCE -->
<div class="card">
<h3>💰 Financial Target (R4,000,000)</h3>
<input type="number" id="finance">
<div class="progress-bar"><div class="progress" id="financeBar"></div></div>
<div class="metric" id="financePercent"></div>
</div>

<!-- TRAINING -->
<div class="card">
<h3>🏋 Weekly Training (Goal 10h)</h3>
<input type="number" id="training">
<div class="progress-bar"><div class="progress" id="trainingBar"></div></div>
<div class="metric" id="trainingPercent"></div>
</div>

<!-- BODY -->
<div class="card">
<h3>⚖ Body Weight</h3>
<input type="number" id="weight">
<div class="metric" id="weightDisplay"></div>
</div>

<!-- READINESS -->
<div class="card">
<h3>📊 Campaign Readiness Score</h3>
<div class="metric" id="readinessScore"></div>
</div>

</div>

<script>

// TARGET DATE (edit if Dakar date confirmed)
const targetDate = new Date("January 5, 2030 00:00:00").getTime();
const financeGoal = 4000000;

function updateCountdown() {

    const now = new Date().getTime();
    let diff = targetDate - now;

    if (diff <= 0) {
        document.querySelectorAll(".time-box span").forEach(el => el.innerText = "0");
        return;
    }

    const seconds = Math.floor(diff / 1000) % 60;
    const minutes = Math.floor(diff / (1000 * 60)) % 60;
    const hours = Math.floor(diff / (1000 * 60 * 60)) % 24;
    const daysTotal = Math.floor(diff / (1000 * 60 * 60 * 24));

    // Accurate year calculation accounting for leap years
    const nowDate = new Date();
    const target = new Date(targetDate);
    let years = target.getFullYear() - nowDate.getFullYear();

    const thisYearTarget = new Date(nowDate.getFullYear() + years, target.getMonth(), target.getDate());
    if (nowDate > thisYearTarget) {
        years--;
    }

    const yearAdjustedDate = new Date(nowDate.getFullYear() + years, nowDate.getMonth(), nowDate.getDate());
    const remainingDays = Math.floor((target - yearAdjustedDate) / (1000 * 60 * 60 * 24));

    document.getElementById("years").innerText = years;
    document.getElementById("days").innerText = remainingDays;
    document.getElementById("hours").innerText = hours;
    document.getElementById("minutes").innerText = minutes;
    document.getElementById("seconds").innerText = seconds;
}

function save(key,val){ localStorage.setItem(key,val); }
function load(key){ return localStorage.getItem(key); }

function updateFinance() {
    let val = document.getElementById("finance").value || 0;
    save("finance",val);
    let percent = (val/financeGoal)*100;
    document.getElementById("financeBar").style.width = percent + "%";
    document.getElementById("financePercent").innerText = Math.floor(percent) + "% Funded";
    calculateReadiness();
}

function updateTraining() {
    let val = document.getElementById("training").value || 0;
    save("training",val);
    let percent = (val/10)*100;
    document.getElementById("trainingBar").style.width = percent + "%";
    document.getElementById("trainingPercent").innerText = Math.floor(percent) + "% of Weekly Target";
    calculateReadiness();
}

function updateWeight() {
    let val = document.getElementById("weight").value || 0;
    save("weight",val);
    document.getElementById("weightDisplay").innerText = val + " kg";
}

function calculateReadiness(){
    let finance = (document.getElementById("finance").value/financeGoal)*50;
    let training = (document.getElementById("training").value/10)*30;
    let score = finance + training;
    if(score>100) score=100;
    document.getElementById("readinessScore").innerText = Math.floor(score) + "% Campaign Ready";
}

document.getElementById("finance").addEventListener("input", updateFinance);
document.getElementById("training").addEventListener("input", updateTraining);
document.getElementById("weight").addEventListener("input", updateWeight);

function loadAll(){
    if(load("finance")) document.getElementById("finance").value=load("finance");
    if(load("training")) document.getElementById("training").value=load("training");
    if(load("weight")) document.getElementById("weight").value=load("weight");
    updateFinance();
    updateTraining();
    updateWeight();
}

setInterval(updateCountdown,1000);
loadAll();

</script>

</body>
</html>
